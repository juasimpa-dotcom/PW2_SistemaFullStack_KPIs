name: sistema-kpis
version: "3.8"

services:
  postgres:
    image: postgres:18.1-trixie
    container_name: kpis_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "12345678"
      POSTGRES_DB: kpis_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kpis_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kpis_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.5
    container_name: kpis_keycloak
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: "12345678"
      KC_DB_SCHEMA: public
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8080"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_LOG_LEVEL: INFO
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./init-scripts:/opt/keycloak/data/import
    networks:
      - kpis_network
    depends_on:
      postgres:
        condition: service_healthy
    command: ["start-dev", "--import-realm"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G

  backend:
    build:
      context: ../backend/SistemaKpis
      dockerfile: Dockerfile
      args:
        - DOTNET_BUILD_CONFIGURATION=Release
    container_name: kpis_backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=kpis_db;Username=postgres;Password=12345678"
      Keycloak__Authority: "http://keycloak:8080"
      Keycloak__Realm: "kpis-realm"
      Keycloak__ClientId: "api-kpis-client"
      Jwt__Authority: "http://keycloak:8080/realms/kpis-realm"
      Jwt__Audience: "api-kpis-client"
      AllowedOrigins__0: "http://localhost:4200"
      AllowedOrigins__1: "http://frontend:80"
    ports:
      - "5129:8080"
    networks:
      - kpis_network
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: ../frontend/sistema-kpis-frontend
      dockerfile: Dockerfile
    container_name: kpis_frontend
    restart: unless-stopped
    environment:
      NGINX_HOST: localhost
      NGINX_PORT: "80"
    ports:
      - "4200:80"
    networks:
      - kpis_network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost/health || wget --quiet --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  kpis_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  keycloak_data:
    driver: local
